<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini CRM — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="masthead">
    <div class="brand">
      <span class="brand-mark">Mini CRM</span>
      <span class="brand-tag">lead pipeline</span>
    </div>
    <nav>
      <a href="contact.html" target="_blank">View public contact form ↗</a>
    </nav>
    <div class="user-chip">
      <span id="userLabel">admin</span>
      <button class="btn-ghost-light" id="logoutBtn">Log out</button>
    </div>
  </header>

  <main class="page">

    <div class="pipeline-card">
      <div class="pipeline-head">
        <span class="eyebrow">Pipeline</span>
        <div class="pipeline-readouts">
          <div class="readout">
            <span class="num" id="statTotal">0</span>
            <span class="lbl">Total leads</span>
          </div>
          <div class="readout">
            <span class="num" id="statRate">0%</span>
            <span class="lbl">Conversion rate</span>
          </div>
        </div>
      </div>

      <div class="pipeline-track" id="pipelineTrack">
        <div class="pipeline-seg seg-new empty" id="segNew"></div>
        <div class="pipeline-seg seg-contacted empty" id="segContacted"></div>
        <div class="pipeline-seg seg-converted empty" id="segConverted"></div>
      </div>

      <div class="pipeline-legend">
        <span><i class="dot dot-new"></i> New (<span id="countNew">0</span>)</span>
        <span><i class="dot dot-contacted"></i> Contacted (<span id="countContacted">0</span>)</span>
        <span><i class="dot dot-converted"></i> Converted (<span id="countConverted">0</span>)</span>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Search name, email, or source…" />
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="converted">Converted</option>
      </select>
      <button class="btn btn-secondary" id="refreshBtn">↻ Refresh</button>
    </div>

    <div class="ledger-card">
      <table class="ledger">
        <thead>
          <tr>
            <th>Lead</th>
            <th>Source</th>
            <th>Status</th>
            <th>Received</th>
          </tr>
        </thead>
        <tbody id="leadsBody">
          <!-- rows injected by app.js -->
        </tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="big">No leads match yet</div>
        <div>New submissions from your contact form will show up here.</div>
      </div>
    </div>

  </main>

  <!-- Lead detail drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <div style="font-weight:700; font-size:16px;" id="drawerName">—</div>
        <div class="cell-sub" id="drawerEmail">—</div>
      </div>
      <button class="drawer-close" id="drawerClose">&times;</button>
    </div>
    <div class="drawer-body">

      <div class="field-block">
        <span class="field-label">Status</span>
        <select class="status-select" id="drawerStatus">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="converted">Converted</option>
        </select>
      </div>

      <div class="field-block">
        <span class="field-label">Contact details</span>
        <div class="cell-sub" id="drawerPhone">—</div>
        <div class="cell-sub" id="drawerSource">—</div>
        <div class="cell-sub" id="drawerCreated">—</div>
      </div>

      <div class="field-block">
        <span class="field-label">Message</span>
        <div class="message-box" id="drawerMessage">—</div>
      </div>

      <div class="field-block">
        <span class="field-label">Follow-up notes</span>
        <div class="notes-list" id="notesList"></div>
        <textarea class="note-input" id="noteInput" placeholder="Log a call, email, or update…"></textarea>
        <button class="btn btn-primary" id="addNoteBtn">Add note</button>
      </div>

    </div>
    <div class="drawer-foot">
      <button class="btn btn-danger btn-block" id="deleteLeadBtn">Delete lead</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
