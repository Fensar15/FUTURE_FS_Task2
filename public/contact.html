<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card" style="width: 420px;">
      <div class="brand-mark">Acme Studio</div>
      <h1>Get in touch</h1>
      <p class="sub">Tell us a bit about your project and we'll follow up shortly.</p>

      <div id="alertBox"></div>

      <form id="contactForm">
        <div class="form-field">
          <label class="field-label" for="name">Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="form-field">
          <label class="field-label" for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-field">
          <label class="field-label" for="phone">Phone (optional)</label>
          <input type="tel" id="phone" />
        </div>
        <div class="form-field">
          <label class="field-label" for="message">What can we help with?</label>
          <textarea id="message" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Send message</button>
      </form>

      <p class="hint">
        This form simulates a real website's contact form — submissions land directly in the
        <a href="login.html">admin dashboard</a> as new leads.
      </p>
    </div>
  </div>

  <script src="js/contact.js"></script>
</body>
</html>
